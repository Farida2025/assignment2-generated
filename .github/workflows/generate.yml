name: Generate Go Code from Proto

on:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Generated Repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Install Tools and Generate Code
        run: |
     
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
        
          export PATH=$PATH:$(go env GOPATH)/bin
          
      
          git clone https://github.com/Farida2025/assignment2-protos.git proto-repo
          
       
    
          protoc --proto_path=proto-repo/proto \
            --go_out=. --go_opt=module=github.com/Farida2025/assignment2-generated \
            --go-grpc_out=. --go-grpc_opt=module=github.com/Farida2025/assignment2-generated \
            proto-repo/proto/*.proto

      - name: Push Generated Code
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
      
          rm -rf proto-repo
          
          git add .
 
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Auto-generate gRPC code"
            git push origin main
          else
            echo "No changes to commit"
          fi
